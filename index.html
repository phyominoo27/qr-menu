<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="Scan to view our menu">

    <title>QR Menu</title>

    <!-- Self-hosted Fonts (Outfit + Cormorant Garamond + Padauk) -->
    <link rel="stylesheet" href="fonts/fonts.css">

    <!-- Preload critical fonts to avoid render-blocking -->
    <link rel="preload" as="font" href="fonts/outfit-400.ttf" type="font/ttf" crossorigin>
    <link rel="preload" as="font" href="fonts/cormorant-400.ttf" type="font/ttf" crossorigin>
    <link rel="preload" as="font" href="fonts/padauk-400.ttf" type="font/ttf" crossorigin>

    <!-- Preload critical JS (high priority to start parsing/app init sooner) -->
    <link rel="preload" as="script" href="js/app.js" fetchpriority="high">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Favicon (inline SVG data URI) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
</head>
<body class="bg-background text-foreground antialiased">

    <!-- App Mount Point — everything renders here -->
    <div id="app"></div>

    <!-- App Modules -->
    <script type="module" src="js/app.js" defer></script>

</body>
</html>
